name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: macos-arm64
          - os: macos-latest
            target: macos-x64
          - os: ubuntu-latest
            target: linux-x64
          - os: windows-latest
            target: windows-x64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npm run bundle

      - run: node scripts/package.mjs --target=${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: bin/${{ matrix.target }}/

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect binaries and generate checksums
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            target=$(basename "$dir")
            if [ "$target" = "windows-x64" ]; then
              tar -czf "release/lodestar-${target}.tar.gz" -C "$dir" lodestar.exe
            else
              chmod +x "$dir/lodestar"
              tar -czf "release/lodestar-${target}.tar.gz" -C "$dir" lodestar
            fi
          done
          cd release
          sha256sum *.tar.gz > SHA256SUMS

      - name: Publish to public repo
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" release/* \
            --repo Kgard/lodestar-releases \
            --title "Lodestar $TAG" \
            --generate-notes
