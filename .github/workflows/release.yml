name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      target:
        description: 'Build target (or "all")'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - macos-arm64
          - macos-x64
          - linux-x64
          - windows-x64

permissions:
  contents: write

jobs:
  macos-arm64:
    if: inputs.target == 'macos-arm64' || inputs.target == 'all' || github.event_name == 'push'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run bundle
      - run: node scripts/package.mjs --target=macos-arm64

      - name: Import Apple certificate
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Sign binary
        run: |
          codesign --force --options runtime --sign "Developer ID Application: Kenley Gard (A6PV4ZSTTQ)" bin/macos-arm64/lodestar
          codesign --verify --verbose bin/macos-arm64/lodestar

      - name: Notarize binary
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          ZIP_PATH=$RUNNER_TEMP/lodestar-macos-arm64.zip
          ditto -c -k --keepParent bin/macos-arm64/lodestar "$ZIP_PATH"
          xcrun notarytool submit "$ZIP_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 30m

      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: bin/macos-arm64/

  macos-x64:
    if: inputs.target == 'macos-x64' || inputs.target == 'all' || github.event_name == 'push'
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run bundle
      - run: node scripts/package.mjs --target=macos-x64

      - name: Import Apple certificate
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Sign binary
        run: |
          codesign --force --options runtime --sign "Developer ID Application: Kenley Gard (A6PV4ZSTTQ)" bin/macos-x64/lodestar
          codesign --verify --verbose bin/macos-x64/lodestar

      - name: Notarize binary
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          ZIP_PATH=$RUNNER_TEMP/lodestar-macos-x64.zip
          ditto -c -k --keepParent bin/macos-x64/lodestar "$ZIP_PATH"
          xcrun notarytool submit "$ZIP_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 30m

      - uses: actions/upload-artifact@v4
        with:
          name: macos-x64
          path: bin/macos-x64/

  linux-x64:
    if: inputs.target == 'linux-x64' || inputs.target == 'all' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run bundle
      - run: node scripts/package.mjs --target=linux-x64
      - uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: bin/linux-x64/

  windows-x64:
    if: inputs.target == 'windows-x64' || inputs.target == 'all' || github.event_name == 'push'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run bundle
      - run: node scripts/package.mjs --target=windows-x64
      - uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: bin/windows-x64/

  release:
    if: github.event_name == 'push'
    needs: [macos-arm64, macos-x64, linux-x64, windows-x64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect binaries and generate checksums
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            target=$(basename "$dir")
            if [ "$target" = "windows-x64" ]; then
              tar -czf "release/lodestar-${target}.tar.gz" -C "$dir" lodestar.exe
            else
              chmod +x "$dir/lodestar"
              tar -czf "release/lodestar-${target}.tar.gz" -C "$dir" lodestar
            fi
          done
          cd release
          sha256sum *.tar.gz > SHA256SUMS

      - name: Publish to public repo
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" release/* \
            --repo Kgard/lodestar-releases \
            --title "Lodestar $TAG" \
            --generate-notes
